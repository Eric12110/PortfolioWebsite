<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購物車｜Eric Gallery</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- 字體 -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Sans+TC&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f8f9fb;
    }

    .navbar {
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .cart-card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }

    .cart-card:hover {
      transform: translateY(-3px);
    }

    .cart-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
    }

    .total-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      background: white;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.05);
    }
  </style>
</head>

<body>
    <div id="headerContainer"></div>
  <main class="container py-5">
    <h2 class="fw-bold mb-4 text-center">購物車清單</h2>

    <div id="cartList" class="row gy-3"></div>

    <div class="total-box mt-4">
      <div class="d-flex justify-content-between align-items-center">
        <h5 class="fw-bold">總金額：</h5>
        <h5 class="fw-bold text-danger" id="totalAmount">NT$ 0</h5>
      </div>
      <div class="text-end mt-3">
        <button class="btn btn-primary px-4" onclick="goCheckout()">前往結帳</button>
      </div>
    </div>
  </main>

  <footer>
    <p class="text-muted mb-0">© 2025 Eric Gallery. All rights reserved.</p>
  </footer>
</body>
</html>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="/js/firebase-config.js"></script>  
  <script src="/js/cart.js"></script>
  <script src="/js/header.js"></script>
