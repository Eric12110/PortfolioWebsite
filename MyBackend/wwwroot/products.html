<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商品瀏覽｜Eric Gallery</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- AOS 動畫 -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <!-- 字體 -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Sans+TC&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f8f9fb;
    }

    .navbar {
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .product-card {
      border: none;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    .product-img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .product-body {
      padding: 16px;
    }

    .price {
      font-weight: 600;
      color: #e74c3c;
      font-size: 1.2rem;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      background: white;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>
<div id="headerContainer"></div>
  <!-- 商品列表 -->
  <section class="container my-5">
    <h2 class="text-center mb-4 fw-bold">精選商品</h2>
    <div id="productList" class="row g-4 justify-content-center"></div>
  </section>

  <footer>
    <p class="text-muted mb-0">© 2025 Eric Gallery. All rights reserved.</p>
  </footer>

  <!-- Firebase SDK v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- AOS 動畫 -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  <!-- 你的 Firebase 設定 -->
  <script src="/js/firebase-config.js"></script>

  <!-- 商品載入邏輯 -->
  <script src="/js/products.js"></script>

  <script>
    AOS.init();
  </script>

</body>
</html>
