<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Victor Cheng Photography</title>
  <title>Victor Cheng 攝影作品集</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Sans+TC&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="/js/firebase-config.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css" />
</head>

<style>
  #showLoginbtn {
    opacity: 0;
    border: none;
    background: transparent;
    width: 10px;
    height: 10px;
    position: absolute;
    top: 0;
    left: 0;
  }

  /* 容器最大寬度，可改成100%或其他 */
  .swiper {
    width: 100%;
    height: 600px;
    /* 高度可調整 */
    max-width: 1800px;
    /* 如果你想限定最大寬度 */
    margin: 20px auto;
  }

  .swiper-slide img {
    width: 100% !important;
    height: 100% !important;
    display: block;
    object-fit: cover;
  }

  .swiper-button-prev,
  .swiper-button-next {
    background-color: transparent !important;
    color: transparent !important;
  }

  .swiper-pagination {
    display: none !important;
  }

  #imageList {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
  }

  #imageList img {
    width: 100px;
    height: auto;
    border-radius: 8px;
    object-fit: cover;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
  }

  #imageList {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 0 auto;

  }

  .image-item {
    position: relative;
    width: 150px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    transition: box-shadow 0.3s ease;
    background: #fff;
  }

  .image-item:hover {
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
  }

  .image-item img {
    width: 100%;
    height: 100px;
    object-fit: cover;
    display: block;
    border-radius: 12px 12px 0 0;
  }

  .image-item button {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(255, 0, 0, 0.8);
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    transition: background 0.3s ease;
    font-size: 14px;
  }

  .image-item button:hover {
    background: rgba(255, 0, 0, 1);
  }

  #fileInput2 {
    max-width: auto;
  }
</style>

<body oncontextmenu="return false;">
  <div id="headerContainer"></div>
  <!-- 登入區塊，預設隱藏 -->
  <div id="loginSection" style="display: none;">
    <div class="d-flex gap-3">
      <button class="btn btn-outline-primary fw-bold" onclick="googleLogin()">
        <i class="bi bi-google"></i> 使用 Google 登入
      </button>
      <button class="btn btn-outline-danger fw-bold" onclick="googleLogout()">
        <i class="bi bi-box-arrow-right"></i> 登出
      </button>
    </div>
  </div>
  <!-- 輪播圖 -->
  <!-- Swiper HTML結構 -->
  <div class="swiper">
    <div class="swiper-wrapper" id="swiperWrapper">
      <!-- 輪播圖片會動態渲染 -->
    </div>

    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-pagination"></div>
  </div>
  <button id="showLoginbtn" onclick="showLoginSection()"></button>
  <div id="uploadSection" style="display:none;">
    <div class="container py-4">
      <h3>上傳照片</h3>
      <div class="mb-3">
        <label for="personName" class="form-label">人名</label>
        <input type="text" id="personName" class="form-control" placeholder="請輸入人名" required />
      </div>
      <div class="mb-3">
        <select id="category" class="form-select">
          <option value="Wedding">婚禮</option>
          <option value="Portrait">人像</option>
          <option value="Maternity">孕婦寫真</option>
          <option value="Film">底片</option>
          <option value="Family">家人</option>
        </select>
      </div>
      <div class="mb-3">
        <input type="file" id="fileInput" class="form-control" accept="image/*" multiple>
      </div>
      <div id="uploadStatus"></div>
      <div class="mb-3">
        <label for="albumDescription" class="form-label">相簿描述</label>
        <textarea id="albumDescription" class="form-control" rows="2" placeholder="例如：2024.7.20 婚禮現場花絮"></textarea>
      </div>
      <button class="btn btn-primary" id="uploadBtn">上傳</button>
      <h2>管理輪播圖片</h2>
      <div id="imageList">
        <!-- 圖片列表動態產生 -->
      </div>
      <input class="form-control" type="file" id="fileInput2" accept="image/*" multiple style="margin-top: 10px;" />
      <button class="btn btn-primary" onclick="uploadImage()">上傳圖片</button>
    </div>
  </div>
</body>
<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
<script src="/js/index.js"></script>
<script src="/js/header.js"></script>
<script src="/js/config.js"></script>
</html>
