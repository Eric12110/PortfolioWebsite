<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- ✅ Firebase v8 版本 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Sans+TC&display=swap" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container py-5">
    <div id="headerContainer"></div>
    <h1 class="mb-4">商品管理</h1>
    <!-- 商品表單 -->
    <form id="productForm" class="card p-4 mb-5 shadow-sm">
      <input type="hidden" id="productId">
      <div class="mb-3">
        <label class="form-label">商品名稱</label>
        <input type="text" id="productName" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">商品描述</label>
        <textarea id="productDesc" class="form-control" rows="2" required></textarea>
      </div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">價格 (NTD)</label>
          <input type="number" id="productPrice" class="form-control" required>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">數量</label>
          <input type="number" id="productStock" class="form-control" required>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">商品圖片</label>
          <input type="file" id="productImage" class="form-control" accept="image/*">
        </div>
      </div>
      <button class="btn btn-primary" type="submit">儲存商品</button>
    </form>

    <!-- 商品列表 -->
    <table class="table table-bordered align-middle shadow-sm bg-white">
      <thead class="table-light">
        <tr>
          <th>圖片</th>
          <th>名稱</th>
          <th>描述</th>
          <th>價格</th>
          <th>庫存</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="productTable"></tbody>
    </table>
  </div>

  <script src="/js/firebase-config.js"></script>
  <script src="/js/productsEdit.js"></script>
</body>
</html>
