<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上付款</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Sans+TC&display=swap" rel="stylesheet">
</head>

<body class="bg-light">
    <div id="headerContainer"></div>
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h1 class="h3 mb-4 text-center fw-bold">ECPay 線上付款</h1>
                        <p class="text-muted small">填寫以下資訊後系統會導向綠界金流頁面完成付款。</p>
                        <form id="paymentForm" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="customerName" class="form-label">訂購人姓名</label>
                                <input type="text" class="form-control" id="customerName" placeholder="例：王小明" required>
                                <div class="invalid-feedback">請輸入訂購人姓名</div>
                            </div>
                            <div class="mb-3">
                                <label for="customerEmail" class="form-label">電子信箱</label>
                                <input type="email" class="form-control" id="customerEmail" placeholder="example@mail.com" required>
                                <div class="invalid-feedback">請輸入正確的電子信箱</div>
                            </div>
                            <div class="mb-3">
                                <label for="amount" class="form-label">付款金額 (NTD)</label>
                                <input type="number" class="form-control" id="amount" min="1" step="1" placeholder="如：5000" required>
                                <div class="invalid-feedback">請輸入付款金額</div>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">付款用途</label>
                                <input type="text" class="form-control" id="description" placeholder="例如：婚禮攝影訂金" required>
                                <div class="invalid-feedback">請輸入付款用途</div>
                            </div>
                            <div class="mb-3">
                                <label for="items" class="form-label">商品項目 <span class="text-muted small">(可用逗號分隔多個項目)</span></label>
                                <input type="text" class="form-control" id="items" placeholder="婚禮紀錄#精修照片">
                            </div>
                            <button class="btn btn-primary w-100" type="submit" id="submitBtn">前往付款</button>
                        </form>
                        <div id="feedback" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('header.html')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('headerContainer').innerHTML = html;
                    const script = document.createElement("script");
                    script.src = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js";
                    document.body.appendChild(script);
                })
                .catch(err => console.error('載入 header 失敗', err));

            const form = document.getElementById('paymentForm');
            const feedback = document.getElementById('feedback');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                event.stopPropagation();

                if (!form.checkValidity()) {
                    form.classList.add('was-validated');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.innerText = '處理中...';
                feedback.className = 'mt-3 text-muted';
                feedback.innerText = '正在建立付款資訊，請稍候...';

                const payload = {
                    name: document.getElementById('customerName').value.trim(),
                    email: document.getElementById('customerEmail').value.trim(),
                    amount: document.getElementById('amount').value.trim(),
                    description: document.getElementById('description').value.trim(),
                    items: document.getElementById('items').value.split(/[#,]/).map(item => item.trim()).filter(Boolean)
                };

                try {
                    const response = await fetch('/api/ecpay/create-order', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const contentType = response.headers.get('content-type') || '';
                    let data = null;

                    if (contentType.includes('application/json')) {
                        data = await response.json();
                    } else {
                        const text = await response.text();
                        throw new Error(text || '伺服器未回傳預期的資料格式。');
                    }

                    if (!response.ok) {
                        throw new Error((data && data.error) || '建立付款請求失敗');
                    }

                    const formElement = document.createElement('form');
                    formElement.method = data.method || 'POST';
                    formElement.action = data.action;

                    Object.entries(data.formData || {}).forEach(([key, value]) => {
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = key;
                        input.value = value;
                        formElement.appendChild(input);
                    });

                    document.body.appendChild(formElement);
                    formElement.submit();
                } catch (error) {
                    console.error(error);
                    feedback.className = 'mt-3 text-danger';
                    feedback.innerText = error.message || '建立付款請求失敗，請稍後再試。';
                    submitBtn.disabled = false;
                    submitBtn.innerText = '前往付款';
                }
            });
        });
    </script>
</body>

</html>
